name: SQL Lab check

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sql-lab-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Docker versions
        run: |
          set -Eeuo pipefail
          docker --version
          docker compose version

      - name: Initialize environment
        run: make init

      - name: Validate Compose configuration
        run: make config

      - name: Start both databases without UI
        run: make up-no-ui

      - name: Check complete database stand
        run: make check

      - name: Confirm databases are running without Adminer
        run: |
          set -Eeuo pipefail
          set -a
          source .docker.env
          set +a

          compose=(docker compose --env-file .docker.env -p "${COMPOSE_PROJECT_NAME}")
          test -n "$("${compose[@]}" ps --status running --quiet mysql)"
          test -n "$("${compose[@]}" ps --status running --quiet postgres)"
          test -z "$("${compose[@]}" --profile ui ps --status running --quiet adminer)"

      - name: Start Adminer
        run: make up-ui

      - name: Smoke-test Adminer login page
        run: |
          set -Eeuo pipefail
          set -a
          source .docker.env
          set +a

          adminer_url="http://127.0.0.1:${ADMINER_PORT}/"
          html_file="$(mktemp)"
          trap 'rm -f "${html_file}"' EXIT

          adminer_ready=false
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error "${adminer_url}" --output "${html_file}"; then
              adminer_ready=true
              break
            fi
            sleep 2
          done

          test "${adminer_ready}" = true
          grep -F 'MySQL (mysql)' "${html_file}"
          grep -F 'PostgreSQL (postgres)' "${html_file}"
          grep -F 'Как войти' "${html_file}"
          grep -F 'DB_USER' "${html_file}"
          grep -F 'DB_PASSWORD' "${html_file}"
          grep -F 'demo' "${html_file}"
          grep -F 'chinook' "${html_file}"
          if grep -Fi 'world' "${html_file}"; then
            echo 'Adminer exposes World as an available training database' >&2
            exit 1
          fi
          if grep -E "value=['\"]db['\"]" "${html_file}"; then
            echo 'Adminer exposes invalid server db' >&2
            exit 1
          fi

      - name: Stop Adminer
        run: make down-ui

      - name: Confirm UI stopped and databases stayed running
        run: |
          set -Eeuo pipefail
          set -a
          source .docker.env
          set +a

          compose=(docker compose --env-file .docker.env -p "${COMPOSE_PROJECT_NAME}")
          test -z "$("${compose[@]}" --profile ui ps --status running --quiet adminer)"
          test -n "$("${compose[@]}" ps --status running --quiet mysql)"
          test -n "$("${compose[@]}" ps --status running --quiet postgres)"

      - name: Show integration diagnostics
        if: failure()
        run: |
          set -a
          source .docker.env
          set +a

          docker compose --env-file .docker.env -p "${COMPOSE_PROJECT_NAME}" \
            --profile ui ps --all mysql postgres adminer || true
          docker compose --env-file .docker.env -p "${COMPOSE_PROJECT_NAME}" \
            --profile ui logs --no-color mysql postgres adminer || true

      - name: Stop containers
        if: always()
        run: make down
