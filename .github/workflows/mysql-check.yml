name: MySQL check

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mysql-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Initialize environment
        run: make init

      - name: Validate Compose configuration
        run: make config

      - name: Start MySQL and Adminer
        run: make up

      - name: Check databases and user access
        run: make check

      - name: Show container status
        run: make status

      - name: Show diagnostics
        if: failure()
        run: |
          make status || true

          set -a
          source .docker.env
          set +a

          docker compose \
            --env-file .docker.env \
            -p "${COMPOSE_PROJECT_NAME}" \
            logs --no-color || true

      - name: Stop containers
        if: always()
        run: make down
