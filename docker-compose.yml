services:
  mysql:
    image: mysql:${MYSQL_VERSION}
    container_name: ${MYSQL_CONTAINER}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      TZ: Europe/Moscow
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - "${MYSQL_DATA_DIR}:/var/lib/mysql"
      - "${MYSQL_CONF_FILE}:/etc/mysql/conf.d/z-stepik.cnf:ro"
      - "${MYSQL_INITDB_DIR}:/docker-entrypoint-initdb.d:ro"
      - "${MYSQL_SAMPLES_DIR}:/opt/mysql-samples:ro"
    healthcheck:
      test: 'MYSQL_PWD="$${MYSQL_ROOT_PASSWORD}" mysqladmin ping -h 127.0.0.1 -uroot --silent'
      interval: 5s
      timeout: 3s
      retries: 30

  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: ${POSTGRES_CONTAINER}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      TZ: Europe/Moscow
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - "${POSTGRES_DATA_DIR}:/var/lib/postgresql"
      - "${POSTGRES_INITDB_DIR}:/docker-entrypoint-initdb.d:ro"
      - "${POSTGRES_SAMPLES_DIR}:/opt/postgres-samples:ro"
    healthcheck:
      test: 'pg_isready --host=127.0.0.1 -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"'
      interval: 5s
      timeout: 3s
      retries: 30

  adminer:
    image: adminer:${ADMINER_VERSION}
    container_name: ${ADMINER_CONTAINER}
    restart: unless-stopped
    profiles:
      - ui
    environment:
      ADMINER_DESIGN: nette
      TZ: Europe/Moscow
    ports:
      - "${ADMINER_PORT}:8080"
    volumes:
      - "./adminer/plugins-enabled/001-login-servers.php:/var/www/html/plugins-enabled/001-login-servers.php:ro"
      - "./adminer/plugins-enabled/002-login-help.php:/var/www/html/plugins-enabled/002-login-help.php:ro"

